<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportá una norma | Bolivia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 40px; margin-bottom: 40px; }
    .seccion-titulo { border-bottom: 2px solid #0d6efd; padding-bottom: 10px; margin-top: 30px; margin-bottom: 20px; color: #0d6efd; }
    .empresa-fields { display: none; } /* Oculto por defecto */
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8 form-container">
      <h2 class="mb-4">Reportar Normativa Burocrática</h2>
      <p class="text-muted">Indícanos qué norma es un obstáculo para el libre comercio y la competencia en Bolivia.</p>
      
      <form id="reportForm">
        
        <h4 class="seccion-titulo">Datos Personales</h4>
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Nombre <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="nombre" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Apellido <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="apellido" required>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Correo electrónico <span class="text-danger">*</span></label>
            <input type="email" class="form-control" name="correo" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Cédula de Identidad (CI) <span class="text-danger">*</span></label>
            <input type="number" class="form-control" name="ci" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">¿Quieres publicar tu nombre junto con la propuesta? <span class="text-danger">*</span></label>
          <div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="publicar_nombre" value="Si" required>
              <label class="form-check-label">Sí</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="publicar_nombre" value="No">
              <label class="form-check-label">No</label>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">¿Nos escribes en nombre de una empresa u organización? <span class="text-danger">*</span></label>
          <div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="es_empresa" value="Si" id="empresaSi" required>
              <label class="form-check-label">Sí</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="es_empresa" value="No" id="empresaNo">
              <label class="form-check-label">No</label>
            </div>
          </div>
        </div>

        <div class="empresa-fields row mb-3" id="camposEmpresa">
          <div class="col-md-6">
            <label class="form-label">Razón social</label>
            <input type="text" class="form-control" name="razon_social">
          </div>
          <div class="col-md-6">
            <label class="form-label">NIT (Sólo números)</label>
            <input type="number" class="form-control" name="nit">
          </div>
        </div>

        <h4 class="seccion-titulo">Normativa que propones cambiar</h4>
        <div class="mb-3">
          <label class="form-label">Carácter de la norma <span class="text-danger">*</span></label>
          <div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="caracter" value="Nacional" required>
              <label class="form-check-label">Nacional</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="caracter" value="Departamental">
              <label class="form-check-label">Departamental</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="caracter" value="Municipal">
              <label class="form-check-label">Municipal</label>
            </div>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Departamento <span class="text-danger">*</span></label>
            <select class="form-select" name="departamento" required>
              <option value="">Seleccionar...</option>
              <option value="La Paz">La Paz</option>
              <option value="Santa Cruz">Santa Cruz</option>
              <option value="Cochabamba">Cochabamba</option>
              <option value="Oruro">Oruro</option>
              <option value="Potosí">Potosí</option>
              <option value="Chuquisaca">Chuquisaca</option>
              <option value="Tarija">Tarija</option>
              <option value="Beni">Beni</option>
              <option value="Pando">Pando</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Municipio <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="municipio" required>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">Tipo de Norma <span class="text-danger">*</span></label>
            <select class="form-select" name="tipo_norma" required>
              <option value="">Seleccionar...</option>
              <option value="Ley">Ley Nacional</option>
              <option value="Ley Autonomica">Ley Autonómica</option>
              <option value="Decreto Supremo">Decreto Supremo</option>
              <option value="Decreto Departamental">Decreto Departamental</option>
              <option value="Resolucion Ministerial">Resolución Ministerial</option>
              <option value="Resolucion Administrativa">Resolución Administrativa</option>
              <option value="Ordenanza Municipal">Ordenanza Municipal</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Número <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="num_norma" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Año <span class="text-danger">*</span></label>
            <input type="number" class="form-control" name="anio_norma" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Organismo o Institución que dictó la norma <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="organismo" required>
        </div>

        <h4 class="seccion-titulo">Justificación y Propuesta</h4>
        <div class="mb-3">
          <label class="form-label">Título del reporte <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="titulo" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Desarrollo (Por qué es un obstáculo) <span class="text-danger">*</span></label>
          <textarea class="form-control" name="desarrollo" rows="4" required></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">¿Cuál es el cambio propuesto? <span class="text-danger">*</span></label>
          <div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="cambio_propuesto" value="Derogarla" required>
              <label class="form-check-label">Derogarla (Eliminarla)</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="cambio_propuesto" value="Modificarla">
              <label class="form-check-label">Modificarla</label>
            </div>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Propuesta de solución técnica (Opcional)</label>
          <textarea class="form-control" name="propuesta_solucion" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="btnSubmit">Enviar Reporte</button>
        
        <div id="statusMessage" class="mt-3 text-center fw-bold" style="display: none;"></div>
      </form>
    </div>
  </div>
</div>

<script>
  // Script para mostrar/ocultar los campos de empresa dinámicamente
  const empresaSi = document.getElementById('empresaSi');
  const empresaNo = document.getElementById('empresaNo');
  const camposEmpresa = document.getElementById('camposEmpresa');

  empresaSi.addEventListener('change', () => { camposEmpresa.style.display = 'flex'; });
  empresaNo.addEventListener('change', () => { camposEmpresa.style.display = 'none'; });

  // Script para enviar los datos a Google Sheets
  const form = document.getElementById('reportForm');
  const btnSubmit = document.getElementById('btnSubmit');
  const statusMessage = document.getElementById('statusMessage');

  // REEMPLAZA ESTA URL CON LA QUE OBTUVISTE EN GOOGLE APPS SCRIPT
  const SCRIPT_URL = 'TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI';

  form.addEventListener('submit', e => {
    e.preventDefault();
    
    // Cambiar estado del botón
    btnSubmit.disabled = true;
    btnSubmit.innerText = 'Enviando datos...';
    statusMessage.style.display = 'none';

    // Recolectar datos
    let requestBody = new FormData(form);

    fetch(SCRIPT_URL, { method: 'POST', body: requestBody })
      .then(response => {
        statusMessage.style.display = 'block';
        statusMessage.className = 'mt-3 text-center text-success';
        statusMessage.innerText = '¡Reporte enviado exitosamente!';
        form.reset();
        camposEmpresa.style.display = 'none'; // Ocultar campos de empresa al resetear
        btnSubmit.disabled = false;
        btnSubmit.innerText = 'Enviar Reporte';
      })
      .catch(error => {
        console.error('Error!', error.message);
        statusMessage.style.display = 'block';
        statusMessage.className = 'mt-3 text-center text-danger';
        statusMessage.innerText = 'Hubo un error al enviar. Intenta nuevamente.';
        btnSubmit.disabled = false;
        btnSubmit.innerText = 'Enviar Reporte';
      });
  });
</script>

</body>
</html>
