<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportá una norma | Bolivia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Variables de Color Corporativo (Dorados) */
    :root {
      --gold-primary: #C5A059;     /* Dorado principal */
      --gold-dark: #8C713B;        /* Dorado oscuro (para hover o texto) */
      --gold-light: #F4F0E6;       /* Dorado muy claro (fondos) */
      --gold-border: #D8C397;      /* Dorado para bordes sutiles */
      --text-main: #2C3E50;        /* Texto principal oscuro y elegante */
      --text-muted: #596A7A;       /* Texto secundario */
      --bg-body: #FAFAFA;          /* Fondo general más limpio */
    }

    /* Estilos Generales y Tipografía */
    body { 
      background-color: var(--bg-body); 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
      color: var(--text-main);
    }

    /* Barra Tricolor Boliviana */
    .tricolor-bar {
      height: 6px;
      width: 100%;
      background: linear-gradient(90deg, #D52B1E 33.33%, #F9E000 33.33%, #F9E000 66.66%, #007A33 66.66%);
    }

    /* Cabecera de Logos */
    .header-logos {
      background-color: #ffffff;
      padding: 15px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      margin-bottom: 40px;
      border-bottom: 1px solid var(--gold-border);
    }
    
    .header-logos img {
      max-height: 65px;
      object-fit: contain;
    }

    /* Contenedor del Formulario */
    .form-container { 
      background: #ffffff; 
      padding: 45px 50px; 
      border-radius: 12px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
      border: 1px solid rgba(197, 160, 89, 0.2);
      margin-bottom: 50px; 
    }

    /* Títulos Generales */
    .main-title {
      color: var(--gold-dark);
      letter-spacing: 0.5px;
    }
    
    .subtitle {
      color: var(--text-muted);
    }

    /* Títulos de Sección */
    .seccion-titulo { 
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-main);
      border-bottom: 2px solid var(--gold-primary); 
      padding-bottom: 8px; 
      margin-top: 2.5rem; 
      margin-bottom: 1.5rem; 
      display: inline-block; /* Para que el borde dorado solo ocupe el texto */
    }

    /* Estilos de Inputs */
    .form-label {
      font-weight: 500;
      color: var(--text-main);
      font-size: 0.95rem;
    }
    
    .form-control, .form-select {
      border-radius: 8px;
      padding: 0.7rem 1rem;
      border: 1px solid #E0E4E8;
      background-color: #FDFDFD;
      transition: all 0.3s ease;
      color: var(--text-main);
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--gold-primary);
      background-color: #ffffff;
      box-shadow: 0 0 0 0.25rem rgba(197, 160, 89, 0.15);
    }
    
    .form-control::placeholder {
      color: #AAB7C4;
    }

    /* Checkboxes y Radios */
    .form-check-input:checked {
      background-color: var(--gold-primary);
      border-color: var(--gold-primary);
    }

    .form-check-input:focus {
      box-shadow: 0 0 0 0.25rem rgba(197, 160, 89, 0.25);
      border-color: var(--gold-primary);
    }

    /* Contenedores resaltados (Cajas grises claras) */
    .bg-light {
      background-color: var(--gold-light) !important;
      border-color: var(--gold-border) !important;
    }

    /* Botón de Envío */
    .btn-primary {
      background-color: var(--gold-primary);
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      color: white;
      transition: all 0.3s ease;
      text-transform: uppercase;
      font-weight: 700 !important;
    }

    .btn-primary:hover, .btn-primary:focus {
      background-color: var(--gold-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(197, 160, 89, 0.3);
      color: white;
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* Clases de utilidad */
    .empresa-fields { display: none; }
    .text-danger { color: #D9534F !important; font-weight: bold; }
    
    /* Mensajes de estado */
    .bg-success { background-color: #28a745 !important; }
    .bg-danger { background-color: #dc3545 !important; }

    /* Responsividad */
    @media (max-width: 768px) {
      .form-container { padding: 30px 20px; }
      .header-logos img { max-height: 50px; }
    }
  </style>
</head>
<body>

<div class="tricolor-bar"></div>

<header class="header-logos">
  <div class="container d-flex justify-content-between align-items-center">
    <img src="https://via.placeholder.com/250x70/ffffff/C5A059?text=Logo+Instituci%C3%B3n" alt="Logo de la Institución">
    <img src="https://via.placeholder.com/250x70/ffffff/C5A059?text=Escudo+Nacional" alt="Escudo Nacional o Ministerio">
  </div>
</header>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-9 col-md-10 form-container">
      
      <div class="text-center mb-5">
        <h2 class="fw-bold main-title mb-3">REPORTA TU TRANCA</h2>
        <p class="subtitle fs-5">Indícanos qué norma es un obstáculo para el libre comercio y la competencia en Bolivia.</p>
      </div>
      
      <form id="reportForm">
        
        <h4 class="seccion-titulo">Datos Personales</h4>
        <div class="row mb-3">
          <div class="col-md-6 mb-3 mb-md-0">
            <label class="form-label">Nombre <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="nombre" placeholder="Ej. María" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Apellido <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="apellido" placeholder="Ej. Pérez" required>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6 mb-3 mb-md-0">
            <label class="form-label">Correo electrónico <span class="text-danger">*</span></label>
            <input type="email" class="form-control" name="correo" placeholder="correo@ejemplo.com" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Cédula de Identidad (CI) <span class="text-danger">*</span></label>
            <input type="number" class="form-control" name="ci" placeholder="Solo números" required>
          </div>
        </div>

        <div class="mb-4 mt-4 p-4 bg-light border rounded">
          <label class="form-label mb-3 d-block">¿Quieres publicar tu nombre junto con la propuesta? <span class="text-danger">*</span></label>
          <div class="form-check form-check-inline me-4">
            <input class="form-check-input" type="radio" name="publicar_nombre" value="Si" id="pubSi" required>
            <label class="form-check-label" for="pubSi">Sí, acepto</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="publicar_nombre" value="No" id="pubNo">
            <label class="form-check-label" for="pubNo">No, prefiero anonimato</label>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label d-block mb-3">¿Nos escribes en nombre de una empresa u organización? <span class="text-danger">*</span></label>
          <div class="form-check form-check-inline me-4">
            <input class="form-check-input" type="radio" name="es_empresa" value="Si" id="empresaSi" required>
            <label class="form-check-label" for="empresaSi">Sí</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="es_empresa" value="No" id="empresaNo">
            <label class="form-check-label" for="empresaNo">No</label>
          </div>
        </div>

        <div class="empresa-fields row mb-3 p-4 bg-light border rounded mt-3" id="camposEmpresa">
          <div class="col-md-6 mb-3 mb-md-0">
            <label class="form-label">Razón social</label>
            <input type="text" class="form-control" name="razon_social" placeholder="Nombre de la empresa">
          </div>
          <div class="col-md-6">
            <label class="form-label">NIT (Sólo números)</label>
            <input type="number" class="form-control" name="nit" placeholder="Ej. 1029384029">
          </div>
        </div>

        <h4 class="seccion-titulo">Normativa que propones cambiar</h4>
        <div class="mb-4">
          <label class="form-label d-block mb-3">Carácter de la norma <span class="text-danger">*</span></label>
          <div class="form-check form-check-inline me-4">
            <input class="form-check-input" type="radio" name="caracter" value="Nacional" id="carNac" required>
            <label class="form-check-label" for="carNac">Nacional</label>
          </div>
          <div class="form-check form-check-inline me-4">
            <input class="form-check-input" type="radio" name="caracter" value="Departamental" id="carDep">
            <label class="form-check-label" for="carDep">Departamental</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="caracter" value="Municipal" id="carMun">
            <label class="form-check-label" for="carMun">Municipal</label>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6 mb-3 mb-md-0">
            <label class="form-label">Departamento <span class="text-danger">*</span></label>
            <select class="form-select" name="departamento" required>
              <option value="" selected disabled>Seleccionar...</option>
              <option value="La Paz">La Paz</option>
              <option value="Santa Cruz">Santa Cruz</option>
              <option value="Cochabamba">Cochabamba</option>
              <option value="Oruro">Oruro</option>
              <option value="Potosí">Potosí</option>
              <option value="Chuquisaca">Chuquisaca</option>
              <option value="Tarija">Tarija</option>
              <option value="Beni">Beni</option>
              <option value="Pando">Pando</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Municipio <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="municipio" placeholder="Ej. El Alto" required>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4 mb-3 mb-md-0">
            <label class="form-label">Tipo de Norma <span class="text-danger">*</span></label>
            <select class="form-select" name="tipo_norma" required>
              <option value="" selected disabled>Seleccionar...</option>
              <option value="Ley">Ley Nacional</option>
              <option value="Ley Autonomica">Ley Autonómica</option>
              <option value="Decreto Supremo">Decreto Supremo</option>
              <option value="Decreto Departamental">Decreto Departamental</option>
              <option value="Resolucion Ministerial">Resolución Ministerial</option>
              <option value="Resolucion Administrativa">Resolución Administrativa</option>
              <option value="Ordenanza Municipal">Ordenanza Municipal</option>
            </select>
          </div>
          <div class="col-md-4 mb-3 mb-md-0">
            <label class="form-label">Número <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="num_norma" placeholder="Ej. 843" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Año <span class="text-danger">*</span></label>
            <input type="number" class="form-control" name="anio_norma" placeholder="Ej. 2023" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Organismo o Institución que dictó la norma <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="organismo" placeholder="Ej. Ministerio de Economía y Finanzas Públicas" required>
        </div>

        <h4 class="seccion-titulo">Justificación y Propuesta</h4>
        <div class="mb-3">
          <label class="form-label">Título del reporte <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="titulo" placeholder="Breve resumen del problema" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Desarrollo (Por qué es un obstáculo) <span class="text-danger">*</span></label>
          <textarea class="form-control" name="desarrollo" rows="5" placeholder="Explica detalladamente cómo esta norma afecta la actividad económica..." required></textarea>
        </div>

        <div class="mb-4 mt-4 p-4 bg-light border rounded">
          <label class="form-label d-block mb-3">¿Cuál es el cambio propuesto? <span class="text-danger">*</span></label>
          <div class="form-check form-check-inline me-4">
            <input class="form-check-input" type="radio" name="cambio_propuesto" value="Derogarla" id="camDerog" required>
            <label class="form-check-label" for="camDerog">Derogarla (Eliminarla)</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="cambio_propuesto" value="Modificarla" id="camMod">
            <label class="form-check-label" for="camMod">Modificarla</label>
          </div>
        </div>

        <div class="mb-5">
          <label class="form-label">Propuesta de solución técnica (Opcional)</label>
          <textarea class="form-control" name="propuesta_solucion" rows="4" placeholder="Si tienes una propuesta de redacción o solución alternativa, escríbela aquí..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="btnSubmit">Enviar Reporte Institucional</button>
        
        <div id="statusMessage" class="mt-4 p-3 rounded text-center fw-bold shadow-sm" style="display: none;"></div>
      </form>
    </div>
  </div>
</div>

<script>
  // Mostrar/ocultar los campos de empresa dinámicamente
  const empresaSi = document.getElementById('empresaSi');
  const empresaNo = document.getElementById('empresaNo');
  const camposEmpresa = document.getElementById('camposEmpresa');

  empresaSi.addEventListener('change', () => { camposEmpresa.style.display = 'flex'; });
  empresaNo.addEventListener('change', () => { camposEmpresa.style.display = 'none'; });

  // Envío de datos a Google Sheets
  const form = document.getElementById('reportForm');
  const btnSubmit = document.getElementById('btnSubmit');
  const statusMessage = document.getElementById('statusMessage');

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyA-v0aHYqMK6itI3QgNNH2zQa37j0ARPqmLZIbxrBadKjy7cSemzZGTn3lRlFllcWWHA/exec';

  form.addEventListener('submit', e => {
    e.preventDefault();
    
    // UI Loading state
    btnSubmit.disabled = true;
    btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Enviando datos...';
    statusMessage.style.display = 'none';

    let requestBody = new FormData(form);

    fetch(SCRIPT_URL, { method: 'POST', body: requestBody })
      .then(response => {
        statusMessage.style.display = 'block';
        statusMessage.className = 'mt-4 p-3 rounded text-center fw-bold shadow-sm bg-success text-white';
        statusMessage.innerText = '¡Su reporte ha sido enviado exitosamente!';
        form.reset();
        camposEmpresa.style.display = 'none'; 
        btnSubmit.disabled = false;
        btnSubmit.innerText = 'Enviar Reporte Institucional';
      })
      .catch(error => {
        console.error('Error!', error.message);
        statusMessage.style.display = 'block';
        statusMessage.className = 'mt-4 p-3 rounded text-center fw-bold shadow-sm bg-danger text-white';
        statusMessage.innerText = 'Hubo un error de conexión al enviar. Intente nuevamente.';
        btnSubmit.disabled = false;
        btnSubmit.innerText = 'Enviar Reporte Institucional';
      });
  });
</script>

</body>
</html>
